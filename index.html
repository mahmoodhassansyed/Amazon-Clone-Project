<!doctype html>
<html>
    <head>
        <title>Amazon Project</title>

        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="styles/shared/general.css" />
        <link rel="stylesheet" href="styles/shared/amazon-header.css" />
        <link rel="stylesheet" href="styles/shared/splash.css" />
        <link rel="stylesheet" href="styles/pages/amazon.css" />
    </head>
    <body>
        <!-- Splash Screen -->
        <div class="splash-screen js-splash-screen">
            <div class="splash-content">
                <div class="splash-logo">Amazon Website Clone</div>
                <div class="splash-divider"></div>
                <div class="splash-text">Created by</div>
                <div class="splash-text">Syed Mahmood Hassan</div>
                <div class="splash-divider"></div>
                <div class="splash-subtext">Built with Vanilla Javascript</div>
                <div class="splash-subtext">Plain HTML and CSS</div>
                <div class="splash-tech">
                    No frameworks. Pure web development.
                </div>
                <div class="splash-thanks">Thank you for visiting</div>
            </div>
        </div>

        <div class="amazon-header">
            <div class="amazon-header-left-section">
                <a href="index.html" class="header-link">
                    <img
                        class="amazon-logo"
                        src="images/amazon-logo-white.png"
                    />
                    <img
                        class="amazon-mobile-logo"
                        src="images/amazon-mobile-logo-white.png"
                    />
                </a>
            </div>

            <div class="amazon-header-middle-section">
                <input class="search-bar" type="text" placeholder="Search" />

                <button class="search-button">
                    <img
                        class="search-icon"
                        src="images/icons/search-icon.png"
                    />
                </button>
            </div>

            <div class="amazon-header-right-section">
                <a class="orders-link header-link" href="orders.html">
                    <span class="returns-text">Returns</span>
                    <span class="orders-text">& Orders</span>
                </a>

                <a class="cart-link header-link" href="checkout.html">
                    <img class="cart-icon" src="images/icons/cart-icon.png" />
                    <div class="cart-quantity js-cart-quantity">0</div>
                    <div class="cart-text">Cart</div>
                </a>
            </div>
        </div>

        <div class="main">
            <div class="products-grid js-products-grid"></div>
        </div>

        <script type="module">
            import { initializeSplashScreen } from './scripts/splash.js';
            initializeSplashScreen();
        </script>
        <script type="module" src="scripts/amazon.js"></script>
    </body>
</html>
